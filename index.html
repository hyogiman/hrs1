<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>더 레이스 — 참가자</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{--track:#10231C;--board:#0B1512;--panel:#163026;--line:#24443A;
  --amber:#FFB020;--amber-dim:#8A6420;--chalk:#F2EFE6;--muted:#9DB4AA;--up:#5BC77E;--down:#E06A5A}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--track);color:var(--chalk);font-family:'Pretendard',sans-serif;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 110px}
.tote{position:sticky;top:0;z-index:50;background:var(--board);border-bottom:2px solid var(--line);
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.tote .who{font-size:13px;color:var(--muted)} .tote .who b{color:var(--chalk);font-size:15px}
.money{font-family:'Chakra Petch',monospace;font-weight:700;font-size:22px;color:var(--amber);
  text-shadow:0 0 12px rgba(255,176,32,.35)}
.money small{font-size:12px;color:var(--amber-dim)}
.phasebar{position:sticky;top:47px;z-index:49;background:var(--panel);border-bottom:1px solid var(--line);
  padding:8px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
.phasebar b{color:var(--amber)}
.phasebar .clock{font-family:'Chakra Petch',monospace;font-size:18px;color:var(--amber)}
.phasebar .clock.warn{color:var(--down)}
h1.title{font-family:'Black Han Sans';font-size:34px;text-align:center;margin:40px 0 6px}
h1.title span{color:var(--amber)}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0}
.card h3{font-size:14px;color:var(--amber);margin-bottom:10px;letter-spacing:1px}
input,select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--line);
  background:var(--board);color:var(--chalk);font-size:16px;font-family:inherit}
button.primary{width:100%;padding:14px;border:none;border-radius:8px;background:var(--amber);color:#1A1205;
  font-family:'Black Han Sans';font-size:18px;margin-top:12px;cursor:pointer}
button.primary:disabled{background:var(--amber-dim);color:#3A2E10}
button.ghost{padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:transparent;
  color:var(--chalk);font-size:14px;cursor:pointer}
.notice{background:var(--board);border-left:3px solid var(--amber);padding:10px 12px;font-size:13px;
  color:var(--muted);border-radius:0 8px 8px 0;margin:10px 0}
/* ── 하단 탭바 ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--board);
  border-top:2px solid var(--line);display:flex;max-width:480px;margin:0 auto}
.tabbar button{flex:1;padding:12px 0 14px;background:none;border:none;color:var(--muted);
  font-family:'Pretendard';font-size:13px;cursor:pointer}
.tabbar button .ic{display:block;font-size:20px;margin-bottom:2px}
.tabbar button.on{color:var(--amber)}
.tabbar button .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);
  margin-left:3px;vertical-align:middle}
/* ── 출마표 상세 ── */
.hswitch{display:flex;gap:6px;justify-content:center;margin:14px 0 6px;flex-wrap:wrap}
.hswitch button{padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--board);
  color:var(--muted);font-family:'Black Han Sans';font-size:15px;cursor:pointer}
.hswitch button.on{border-color:var(--amber);color:var(--amber)}
.hdetail{text-align:center;padding:20px 16px}
.hdetail .em{font-size:64px}
.hdetail .nm{font-family:'Black Han Sans';font-size:36px;margin:4px 0}
.hdetail .tag{font-size:15px;color:var(--muted)}
.hdetail .cond{font-size:15px;margin-top:6px}
.cond.dn{color:var(--down)}.cond.ok{color:var(--up)}
.statlist{margin-top:14px;text-align:left}
.statrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.statrow .sn{width:64px;font-size:15px}
.statrow .sbar{flex:1;height:14px;background:var(--board);border-radius:7px;overflow:hidden}
.statrow .sbar i{display:block;height:100%;border-radius:7px}
.statrow .sv{width:26px;text-align:right;font-family:'Chakra Petch',monospace;font-size:16px;color:var(--amber)}
.condbanner{background:var(--board);border:1px solid var(--amber-dim);border-radius:10px;padding:12px;
  text-align:center;font-family:'Black Han Sans';font-size:17px;color:var(--amber);margin:14px 0 4px}
.condbanner small{display:block;font-family:'Pretendard';font-size:12px;color:var(--muted);margin-top:4px}
/* ── 정보 카드 ── */
.news{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;margin:10px 0}
.news .src{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--board);border:1px solid var(--line)}
.rel{font-family:'Chakra Petch',monospace;font-size:12px;color:var(--amber)}
.news .body{font-size:14px;line-height:1.55}
.news .eff{margin-top:8px;font-size:12.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:7px}
.news .eff b.up{color:var(--up)}.news .eff b.dn{color:var(--down)}
.news.hiddencard{border-color:var(--amber-dim)}
.truth-t{color:var(--up);font-weight:700}.truth-f{color:var(--down);font-weight:700}
/* ── 상점 ── */
.shopitem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 0;border-bottom:1px dashed var(--line)}
.shopitem:last-child{border:none}
.shopitem .n{font-size:15px;font-weight:600}.shopitem .d{font-size:12px;color:var(--muted);margin-top:3px}
.price{font-family:'Chakra Petch',monospace;color:var(--amber);font-size:15px;white-space:nowrap}
/* ── 베팅 ── */
.mypick{background:var(--board);border:1px solid var(--up);border-radius:10px;padding:11px 13px;
  font-size:13.5px;margin:10px 0}
.mypick b{color:var(--up)}
.betrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.betrow .nm{width:60px;font-family:'Black Han Sans';font-size:16px}
.betrow input{flex:1;text-align:right;font-family:'Chakra Petch',monospace}
.betsum{display:flex;justify-content:space-between;font-family:'Chakra Petch',monospace;font-size:14px;
  padding:10px 2px;color:var(--muted)}
.betsum b{color:var(--amber)}
/* ── 결과/리포트 ── */
.paytable{width:100%;font-size:13px;border-collapse:collapse;margin-top:8px}
.paytable td,.paytable th{padding:7px 4px;border-bottom:1px solid var(--line);text-align:left}
.paytable td.num{font-family:'Chakra Petch',monospace;text-align:right;color:var(--amber)}
.bignum{font-family:'Chakra Petch',monospace;font-size:30px;color:var(--amber);text-align:center;
  text-shadow:0 0 14px rgba(255,176,32,.4)}
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.mcell{background:var(--board);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
.mcell .lb{font-size:12px;color:var(--muted)}
.mcell .ct{font-family:'Chakra Petch',monospace;font-size:26px;margin-top:4px}
.mcell.hl{border-color:var(--amber)}
.report-p{font-size:14px;line-height:1.7;margin:10px 0}
.hidden{display:none!important}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--amber);color:#1A1205;
  padding:10px 20px;border-radius:24px;font-weight:700;font-size:14px;z-index:99;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="tote hidden" id="tote">
  <div class="who">참가자 <b id="myName">—</b></div>
  <div class="money"><span id="myMoney">0</span><small> 만원</small></div>
</div>
<div class="phasebar hidden" id="phasebar">
  <span>ROUND <b id="pbRound">-</b>/10 · <span id="pbPhase">대기</span></span>
  <span class="clock" id="pbClock"></span>
</div>

<div class="wrap">

  <div id="v-join">
    <h1 class="title">THE <span>RACE</span></h1>
    <p class="sub">10라운드 · 최종 자금 순위로 우승이 결정됩니다</p>
    <div class="card"><h3>입장</h3>
      <input type="text" id="joinName" placeholder="이름을 입력하세요" maxlength="10">
      <input type="text" id="joinCode" placeholder="입장코드" maxlength="12" style="margin-top:8px">
      <button class="primary" id="btnJoin">경마장 입장</button>
      <div class="notice" id="joinStatus">⏳ 서버 연결 확인 중…</div>
    </div>
  </div>

  <div id="v-lobby" class="hidden">
    <div class="card"><h3>대기실</h3>
      <p style="font-size:14px;color:var(--muted)">곧 시즌이 시작됩니다. 시작 자금 <b style="color:var(--amber)">100만원</b>,
      10라운드 뒤 자금이 가장 많은 사람이 우승합니다.</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="ghost" style="flex:1" onclick="lobbyView('tuto')">📖 게임 방법</button>
        <button class="ghost" style="flex:1" onclick="lobbyView('dex')">🐎 말 도감</button>
      </div>
    </div>
    <div id="lobbyExtra"></div>
  </div>

  <!-- 라운드 진행: 탭 컨테이너 -->
  <div id="v-round" class="hidden"><div id="tabContent"></div></div>

  <div id="v-race" class="hidden">
    <div class="card" style="text-align:center;padding:36px 16px">
      <div style="font-family:'Black Han Sans';font-size:24px">🏇 경주 진행 중</div>
      <p style="color:var(--muted);font-size:14px;margin-top:8px">스크린을 봐주세요</p></div>
  </div>

  <div id="v-result" class="hidden">
    <div class="card"><h3>나의 정산</h3><div id="myPayout"></div></div>
    <div class="card"><h3>소식 진위 공개</h3><div id="truthFeed"></div></div>
  </div>

  <div id="v-final" class="hidden">
    <div class="card" style="text-align:center"><h3>시즌 종료</h3>
      <div class="bignum" id="finalMoney"></div>
      <div id="finalRank" style="color:var(--muted);font-size:14px;margin-top:6px"></div></div>
    <div class="card"><h3>나의 판단 리포트</h3>
      <p style="font-size:12px;color:var(--muted)">시즌 전체의 베팅 기록을 정리한 리포트입니다.</p>
      <div id="reportBody"></div></div>
  </div>

</div>

<div class="tabbar hidden" id="tabbar">
  <button data-tab="race" onclick="setTab('race')"><span class="ic">🐎</span>출마표</button>
  <button data-tab="news" onclick="setTab('news')"><span class="ic">📰</span>소식</button>
  <button data-tab="shop" onclick="setTab('shop')"><span class="ic">🛒</span>상점</button>
  <button data-tab="bet" onclick="setTab('bet')"><span class="ic">💰</span>베팅<span id="betDot"></span></button>
</div>
<div class="toast" id="toast"></div>

let uid=null,me=null,state=null,results={},myBets={},myOwned={},myVerified={},cardTgAll={},NAMES={};
const disp=h=>NAMES[h]||h;

const $=id=>document.getElementById(id);

/* ════════ 입장 ════════ */
function joinErr(e){
  let msg='입장 실패: '+(e&&e.code||e);
  if(e&&e.code==='auth/configuration-not-found')msg='익명 인증이 꺼져 있습니다 — 운영자에게 알려주세요';
  if(e&&(e.code==='PERMISSION_DENIED'||(''+e).includes('permission')))msg='서버 권한 오류 — 운영자에게 알려주세요';
  $('joinStatus').innerHTML='🔴 '+msg;toast('입장 실패');
}
firebase.auth().signInAnonymously()
  .then(()=>{$('joinStatus').innerHTML='🟢 연결 완료 — 이름을 입력하고 입장하세요';})
  .catch(joinErr);
$('btnJoin').onclick=async()=>{
  const name=$('joinName').value.trim();if(!name)return toast('이름을 입력하세요');
  try{
    if(!firebase.auth().currentUser)await firebase.auth().signInAnonymously();
    uid=firebase.auth().currentUser.uid;
    const ref=db.ref(`${ROOT}/players/${uid}`);
    const snap=await ref.get();
    if(!snap.exists()){
      const codeSnap=await db.ref(`${ROOT}/config/entryCode`).get();
      const code=codeSnap.val();
      if(code&&($('joinCode').value||'').trim()!==code)return toast('입장코드가 올바르지 않습니다');
      await ref.set({name,money:100,welfareUsed:false,joinedAt:Date.now()});
    }
    $('joinStatus').innerHTML='🟢 입장 처리 중…';
    listen();
    setTimeout(()=>{if(!me)$('joinStatus').innerHTML='🔴 입장이 지연되고 있습니다 — 새로고침 후 다시 시도해주세요';},3000);
  }catch(e){joinErr(e);}
};
firebase.auth().onAuthStateChanged(u=>{if(u&&!uid){uid=u.uid;
  db.ref(`${ROOT}/players/${uid}`).get().then(s=>{if(s.exists())listen();});}});

/* ════════ 리스너 ════════ */
function listen(){
  db.ref(`${ROOT}/players/${uid}`).on('value',s=>{me=s.val();if(!me)return;
    $('myName').textContent=me.name;$('myMoney').textContent=fmt(me.money);
    $('tote').classList.remove('hidden');$('phasebar').classList.remove('hidden');
    updateCapDisplay(); // 베팅 탭이 열려 있어도 입력은 안 건드리고 한도 표시만 갱신
    if(!state)return;
    if(lastPhase==='')render();
  });
  db.ref(`${ROOT}/state`).on('value',s=>{state=s.val()||{phase:'lobby',round:0};render();});
  db.ref(`${ROOT}/cardTg`).on('value',s=>{cardTgAll=s.val()||{};
    if(state&&state.phase==='open')renderTab();});
  db.ref(`${ROOT}/names`).on('value',s=>{NAMES=s.val()||{};
    if(state&&state.phase==='open')renderTab();});
  db.ref(`${ROOT}/results`).on('value',s=>{results=s.val()||{};
    if(state&&(state.phase==='result'||state.phase==='final'))render(true);});
  db.ref(`${ROOT}/bets`).on('value',s=>{const b=s.val()||{};myBets={};
    Object.keys(b).forEach(r=>{if(b[r][uid])myBets[r]=b[r][uid];});
    updateBetDot();});
  db.ref(`${ROOT}/owned/${uid}`).on('value',s=>{myOwned=s.val()||{};
    if(activeTab==='news'||activeTab==='shop')renderTab();});
  db.ref(`${ROOT}/verified/${uid}`).on('value',s=>{myVerified=s.val()||{};
    if(activeTab==='news'||activeTab==='shop')renderTab();});
  db.ref(`${ROOT}/consult/${uid}`).on('value',s=>{const c=s.val();
    if(c&&activeTab==='shop')renderTab();});
  setInterval(tick,300);
}

/* ════════ 화면 전환 ════════ */
const VIEWS=['join','lobby','round','race','result','final'];
function show(v){VIEWS.forEach(x=>$('v-'+x).classList.toggle('hidden',x!==v));
  $('tabbar').classList.toggle('hidden',v!=='round');}
const PHASEN={lobby:'대기',open:'자유 탐색 · 베팅',race:'경주 중',result:'정산',final:'시즌 종료'};
function render(force){
  if(!me){show('join');return;}
  const p=state.phase||'lobby';
  const key=p+'_'+state.round+'_'+(state.seed||0);
  $('pbRound').textContent=state.round||'-';$('pbPhase').textContent=PHASEN[p]||p;
  if(key===lastPhase&&!force)return;
  // 새 라운드 진입 시 베팅 상태 초기화(제출본이 있으면 그걸 로드)
  const roundKey=state.round+'_'+(state.seed||0);
  if(roundKey!==lastRound){lastRound=roundKey;selHorse=0;activeTab='race';
    showVerifyPanel=false;showExpertPanel=false;
    const b=myBets[state.round];alloc=b?{...b.stakes}:{};}
  lastPhase=key;
  if(p==='lobby')show('lobby');
  else if(p==='open'){show('round');renderTab();}
  else if(p==='race')show('race');
  else if(p==='result'){show('result');renderResult();}
  else if(p==='final'){show('final');renderFinal();}
  else show('lobby'); // 구버전 페이즈 등 알 수 없는 상태 → 대기실
}
function tick(){
  const el=$('pbClock');if(!el)return;
  if(state&&state.phase==='open'&&state.deadline){
    const left=Math.max(0,Math.ceil((state.deadline-Date.now())/1000));
    el.textContent=`⏱ ${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;
    el.classList.toggle('warn',left<=30);
    const btn=$('btnBet');if(btn)btn.disabled=left===0;
  }else el.textContent='';
}
function field(){return state.field?Object.values(state.field):['질풍','만리','중용','우직','적토'];}
function effStats(h){const s=[...HORSES[h].s];const mods=(state.statMods||{})[h]||{};
  STATN.forEach((n,i)=>{if(mods[n])s[i]=Math.max(1,Math.min(5,s[i]+mods[n]));});return s;}
function tgOf(r,i){return (cardTgAll[r]||{})[i]||null;}
function autoText(){const r=state.round;const[d,mud]=SCHEDULE[r-1];
  let t=`제${r}경주 조건 확정: ${d==='단'?'단거리 1200m':d==='중'?'중거리 1800m':'장거리 2400m'}, 주로 ${mud?'불량':'양호'}.`;
  if(state.fatigue)t+=` 컨디션 공시 — ${state.fatigue}: 전 경주 피로 누적 ▼`;
  else t+=' 전 출전마 컨디션 특이사항 없음.';return t;}

/* ════════ 탭 ════════ */
function setTab(t){activeTab=t;
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  renderTab();}
function updateBetDot(){const d=$('betDot');if(!d)return;
  d.innerHTML=myBets[state&&state.round]?'<span class="dot"></span>':'';}
function renderTab(){
  if(!state||state.phase!=='open')return;
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.tab===activeTab));
  updateBetDot();
  const c=$('tabContent');
  if(activeTab==='race')renderHorseTab(c);
  else if(activeTab==='news')renderNewsTab(c);
  else if(activeTab==='shop')renderShopTab(c);
  else if(activeTab==='bet')renderBetTab(c);
}

/* ── 출마표: 한 마리 상세 ── */
function renderHorseTab(c){
  const[d,mud]=SCHEDULE[state.round-1];const f=field();
  if(selHorse>=f.length)selHorse=0;
  const h=f[selHorse];const st=effStats(h);const fat=state.fatigue===h;
  c.innerHTML=`
  <div class="condbanner">R${state.round} · ${d==='단'?'단거리 1200m':d==='중'?'중거리 1800m':'장거리 2400m'} · 주로 ${mud?'<span style="color:var(--down)">불량 ☔</span>':'양호 ☀'}
    <small>${d==='단'?'스타트가 승부를 가릅니다':d==='장'?'뒷심이 승부를 가릅니다':'균형이 승부를 가릅니다'}${mud?' · 적응력 낮은 말은 큰 페널티':''}</small></div>
  <div class="hswitch">${f.map((x,i)=>`<button class="${i===selHorse?'on':''}" onclick="selHorse=${i};renderTab()" style="${i===selHorse?'':'color:'+HORSES[x].c}">${disp(x)}</button>`).join('')}</div>
  <div class="card hdetail">
    <div class="em">🐎</div>
    <div class="nm" style="color:${HORSES[h].c}">${disp(h)}</div>
    <div class="tag">${HORSES[h].tag}</div>
    <div class="cond ${fat?'dn':'ok'}">${fat?'▼ 전 경주 우승 피로':'● 컨디션 정상'}</div>
    <div class="statlist">${STATN.map((n,i)=>`
      <div class="statrow"><span class="sn">${n}</span>
      <div class="sbar"><i style="width:${st[i]*20}%;background:${HORSES[h].c}"></i></div>
      <span class="sv">${st[i]}</span></div>`).join('')}</div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="ghost" style="flex:1" onclick="selHorse=(selHorse+${f.length-1})%${f.length};renderTab()">◀ 이전</button>
      <button class="ghost" style="flex:1" onclick="selHorse=(selHorse+1)%${f.length};renderTab()">다음 ▶</button>
    </div>
  </div>`;
}

/* ── 소식 ── */
function cardHTML(c2,idx,opts={}){
  const m=MEDIA[c2.m];const tg=tgOf(state.round,idx);
  const text=c2.auto?autoText():(c2.t||'').replace(/\{말\}/g,tg?disp(tg):'?');
  let eff=c2.noeff?'<div class="eff">확정 사실 (공식 공시)</div>'
    :`<div class="eff">사실일 경우 → <b class="${c2.e>0?'up':'dn'}">${tg?disp(tg):'?'} ${c2.e>0?'+':''}${c2.e}</b>${c2.perm?` <b class="${c2.e>0?'up':'dn'}">(${c2.perm} 영구)</b>`:''}</div>`;
  let truth='';
  if(opts.truth!==undefined)truth=`<span class="${opts.truth?'truth-t':'truth-f'}">${opts.truth?'■ 사실':'□ 거짓'}</span>`;
  else if(myVerified[state.round]&&myVerified[state.round].idx===idx&&myVerified[state.round].answer!==undefined)
    truth=`<span class="${myVerified[state.round].answer?'truth-t':'truth-f'}">판별: ${myVerified[state.round].answer?'사실':'거짓'}</span>`;
  return `<div class="news ${opts.hidden?'hiddencard':''}"><div class="src">
    <span class="badge">${opts.hidden?'🔒 ':''}${m.name}</span>
    <span><span class="rel">신뢰도 ${Math.round(m.rel*100)}%</span> ${truth}</span></div>
    <div class="body">${text}</div>${eff}</div>`;
}
function renderNewsTab(c){
  const r=state.round,cards=CARDS[r-1];const owned=myOwned[r]||{};
  let html='<div class="card" style="padding:11px 14px"><h3 style="margin:0">오늘의 소식</h3></div>';
  cards.forEach((cd,i)=>{if(cd.pub)html+=cardHTML(cd,i);});
  const oh=Object.keys(owned).map(i=>cardHTML(cards[i],+i,{hidden:true})).join('');
  if(oh)html+=`<div class="card" style="padding:11px 14px"><h3 style="margin:0">내가 확보한 히든 정보</h3></div>${oh}`;
  else html+=`<div class="notice">숨은 소식 3건은 상점에서 구매할 수 있습니다.</div>`;
  c.innerHTML=html;
}

  if(c.answer)box.innerHTML=`<div class="card"><h3>전문가 소견 — ${disp(c.horse)}</h3>
    <p style="font-size:14px;line-height:1.6">${c.answer}</p></div>`;
  else box.innerHTML=`<div class="card"><h3>전문가 소견 — ${disp(c.horse)}</h3>
    <p style="font-size:14px;color:var(--muted)">⏳ 응답 대기 중… 잠시 후 여기에 표시됩니다.</p></div>`;
}
function renderVerifyResult(){
  const box=$('verifyResultBox');if(!box)return;
  const r=state.round,v=myVerified[r];if(!v)return;
  const c2=CARDS[r-1][v.idx];
  const verdict=v.answer===undefined
    ?'<span style="color:var(--muted)">⏳ 응답 대기 중…</span>'
    :`<b class="${v.answer?'truth-t':'truth-f'}">${v.answer?'■ 사실':'□ 거짓'}</b>`;
  box.innerHTML=`<div class="card"><h3>판별 결과</h3>
    <p style="font-size:14px">[${MEDIA[c2.m].name}] ${disp(tgOf(r,v.idx))||'?'} ${c2.e>0?'+':''}${c2.e} — ${verdict}</p></div>`;
}
function verifyPanelHTML(){
  const r=state.round,cards=CARDS[r-1],owned=myOwned[r]||{};
  const mine=cards.map((c2,i)=>({c:c2,i})).filter(x=>!x.c.noeff&&(x.c.pub||owned[x.i]));
  return `<div class="card" style="border:1px solid var(--amber)"><h3 style="margin-top:0">판별할 소식을 선택하세요 (10만)</h3>${
    mine.map(x=>{
      const txt=(x.c.t||'').replace(/\{말\}/g,disp(tgOf(r,x.i))||'?');
      return `<div class="shopitem"><div style="flex:1;min-width:0">
        <div class="d">[${MEDIA[x.c.m].name}] ${txt.length>34?txt.slice(0,34)+'…':txt}</div>
        <div class="d"><b class="${x.c.e>0?'up':'dn'}">${disp(tgOf(r,x.i))||'?'} ${x.c.e>0?'+':''}${x.c.e}</b></div></div>
        <button class="ghost" onclick="doVerify(${x.i})">판별</button></div>`;}).join('')}
    </div>`;
}
function expertPanelHTML(){
  return `<div class="card" style="border:1px solid var(--amber)"><h3 style="margin-top:0">자문받을 말을 선택하세요 (8만)</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${
      field().map(h=>`<button class="ghost" onclick="doExpert('${h}')" style="color:${HORSES[h].c}">${disp(h)}</button>`).join('')}
    </div></div>`;
}
function renderShopTab(c){
  const r=state.round;const owned=myOwned[r]||{};
  const hiddenLeft=2-Object.keys(owned).length;
  c.innerHTML=`
  <div class="card"><h3>정보 상점 <span style="color:var(--muted);font-size:12px">(구매 내역 비공개)</span></h3>
    <div class="shopitem"><div><div class="n">히든 정보권</div><div class="d">숨은 소식 3건 중 1건 무작위 (남은 횟수 ${Math.max(0,hiddenLeft)})</div></div>
      <button class="ghost" onclick="buyHidden()"><span class="price">5만</span></button></div>
    <div class="shopitem"><div><div class="n">진위 판별권</div><div class="d">보유한 소식 1건의 사실 여부 확정 ${myVerified[r]?'(사용함)':'(라운드당 1회)'}</div></div>
      <button class="ghost" onclick="toggleVerifyPanel()"><span class="price">10만</span></button></div>
    <div class="shopitem"><div><div class="n">전문가 자문권</div><div class="d">말 1마리 종합 소견 — 숨은 소식 미반영, 오차 있음 (라운드당 1회)</div></div>
      <button class="ghost" onclick="toggleExpertPanel()"><span class="price">8만</span></button></div>
  </div>
  ${showVerifyPanel?verifyPanelHTML():''}
  ${showExpertPanel?expertPanelHTML():''}
  <div id="verifyResultBox"></div>
  <div id="consultBox"></div>
  <div class="notice">구매 금액은 보유 자금에서 차감됩니다.</div>`;
  renderVerifyResult();renderConsultInto();
}
function toggleVerifyPanel(){
  if(myVerified[state.round])return toast('판별권은 라운드당 1회');
  showVerifyPanel=!showVerifyPanel;showExpertPanel=false;renderTab();
}
async function toggleExpertPanel(){
  const c=await db.ref(`${ROOT}/consult/${uid}`).get();
  if(c.exists()&&c.val().round===state.round)return toast('자문권은 라운드당 1회');
  showExpertPanel=!showExpertPanel;showVerifyPanel=false;renderTab();
}
async function doVerify(idx){
  const r=state.round;
  if(myVerified[r])return toast('판별권은 라운드당 1회');
  if(!(await pay(PRICES.verify)))return toast('자금이 부족합니다');
  await db.ref(`${ROOT}/verified/${uid}/${r}`).set({idx,req:Date.now()});
  await db.ref(`${ROOT}/log/shop/${r}/${uid}`).push({item:'verify',idx,t:Date.now()});
  showVerifyPanel=false;toast('판별 요청 완료');renderTab();
}
async function doExpert(h){
  const r=state.round;
  const c=await db.ref(`${ROOT}/consult/${uid}`).get();
  if(c.exists()&&c.val().round===r)return toast('자문권은 라운드당 1회');
  if(!(await pay(PRICES.expert)))return toast('자금이 부족합니다');
  await db.ref(`${ROOT}/consult/${uid}`).set({round:r,horse:h,req:Date.now()});
  await db.ref(`${ROOT}/log/shop/${r}/${uid}`).push({item:'expert',horse:h,t:Date.now()});
  showExpertPanel=false;toast('자문 요청 완료');renderTab();
}
async function pay(amount){
  const ref=db.ref(`${ROOT}/players/${uid}/money`);
  const res=await ref.transaction(m=>{if(m===null)return m;if(m<amount)return;return fmt(m-amount);});
  return res.committed&&res.snapshot.val()!==null;
}
async function buyHidden(){
  const r=state.round;const owned=myOwned[r]||{};
  if(Object.keys(owned).length>=2)return toast('히든 정보권은 라운드당 2회까지');
  const hiddenIdx=CARDS[r-1].map((c,i)=>c.pub?null:i).filter(i=>i!==null&&!owned[i]);
  if(!hiddenIdx.length)return toast('더 살 히든 정보가 없습니다');
  if(!(await pay(PRICES.hidden)))return toast('자금이 부족합니다');
  const pick=hiddenIdx[Math.floor(Math.random()*hiddenIdx.length)];
  await db.ref(`${ROOT}/owned/${uid}/${r}/${pick}`).set(true);
  await db.ref(`${ROOT}/log/shop/${r}/${uid}`).push({item:'hidden',t:Date.now()});
  toast('히든 정보 1건 입수! [소식] 탭에서 확인하세요');
}
/* ── 베팅 (입력은 alloc 객체에 저장 — 재렌더에도 증발하지 않음) ── */
function refundOf(){const b=myBets[state.round];return b?b.total:0;}
function capNow(){return Math.floor((me.money+refundOf())*0.5);}
function renderBetTab(c){
  const r=state.round;const f=field();const b=myBets[r];
  c.innerHTML=`
  ${b?`<div class="mypick">✅ 제출된 베팅: <b>${Object.keys(b.stakes).map(h=>`${disp(h)} ${b.stakes[h]}만`).join(' · ')}</b>
    — 마감 전까지 아래에서 수정 후 재제출할 수 있습니다.</div>`
   :`<div class="notice">아직 베팅하지 않았습니다. 마감 전에 제출하세요!</div>`}
  <div class="card"><h3>베팅 — 최대 3마리 · 한도는 보유액의 50%</h3>
    ${f.map(h=>`<div class="betrow"><span class="nm" style="color:${HORSES[h].c}">${disp(h)}</span>
      <input type="number" inputmode="numeric" min="0" step="1" data-h="${h}" value="${alloc[h]||''}" placeholder="0"
       oninput="alloc[this.dataset.h]=+this.value||0;updateCapDisplay()"><span style="font-size:12px;color:var(--muted)">만</span></div>`).join('')}
    <div class="betsum"><span>합계 / 한도</span><span><b id="betTotal">0</b> / <span id="betCap">0</span>만</span></div>
    <button class="primary" id="btnBet" onclick="submitBet()">${b?'수정 재제출':'베팅 제출'}</button>
  </div>`;
  updateCapDisplay();
}
function updateCapDisplay(){
  const t=$('betTotal'),cp=$('betCap');if(!t||!cp||!me||!state)return;
  let sum=0;field().forEach(h=>sum+=alloc[h]||0);
  t.textContent=sum;cp.textContent=capNow();
  t.style.color=sum>capNow()?'var(--down)':'var(--amber)';
}
async function submitBet(){
  const r=state.round;
  if(state.phase!=='open')return toast('지금은 베팅 시간이 아닙니다');
  if(state.deadline&&Date.now()>state.deadline)return toast('베팅이 마감되었습니다');
  const stakes={};let total=0,n=0;
  field().forEach(h=>{const v=Math.floor(alloc[h]||0);if(v>0){stakes[h]=v;total+=v;n++;}});
  if(n===0)return toast('한 마리 이상에 금액을 입력하세요');
  if(n>3)return toast('최대 3마리까지만 가능합니다');
  const refund=refundOf();
  const cap=Math.floor((me.money+refund)*0.5);
  if(total>cap)return toast(`한도(${cap}만)를 초과했습니다`);
  // 이전 베팅 환불 + 새 베팅 차감을 한 번에
  const need=total-refund;
  const res=await db.ref(`${ROOT}/players/${uid}/money`).transaction(m=>{
    if(m===null)return m;if(m<need)return;return fmt(m-need);});
  if(!(res.committed&&res.snapshot.val()!==null))return toast('자금이 부족합니다');
  await db.ref(`${ROOT}/bets/${r}/${uid}`).set({stakes,total,t:Date.now()});
  toast(`베팅 ${refund?'수정 ':''}완료 — ${total}만`);
  renderTab();
}

/* ════════ 결과 ════════ */
function renderResult(){
  const r=state.round,res=results[r];if(!res)return;
  const bet=myBets[r];let html='';
  if(!bet)html='<p style="color:var(--muted);font-size:14px">이번 라운드는 베팅하지 않았습니다.</p>';
  else{
    const winner=res.winner;const odds=res.odds[winner]||0;let backTotal=0;
    html='<table class="paytable"><tr><th>말</th><th style="text-align:right">베팅</th><th style="text-align:right">결과</th></tr>';
    Object.keys(bet.stakes).forEach(h=>{
      const won=h===winner;const back=won?fmt(bet.stakes[h]*odds):0;
      backTotal+=back;
      html+=`<tr><td style="color:${HORSES[h].c}">${disp(h)}${won?' 🏆':''}</td><td class="num">${bet.stakes[h]}만</td>
        <td class="num" style="color:${back>0?'var(--up)':'var(--down)'}">${back>0?'+'+back:'0'}만</td></tr>`;});
    const net=fmt(backTotal-bet.total);
    html+=`</table><div class="bignum" style="margin-top:12px;color:${net>=0?'var(--up)':'var(--down)'}">${net>=0?'+':''}${net}만</div>
      <p style="text-align:center;font-size:12px;color:var(--muted)">우승 ${disp(res.winner)} · 확정 배당 ${odds.toFixed(2)}배</p>`;
  }
  $('myPayout').innerHTML=html;
  let tf='';CARDS[r-1].forEach((c,i)=>{if(c.noeff)return;
    tf+=cardHTML(c,i,{truth:!!(res.truths&&res.truths[i]),hidden:!c.pub});});
  $('truthFeed').innerHTML=tf;
}

/* ════════ 최종 + 리포트 ════════ */
async function renderFinal(){
  $('finalMoney').textContent=fmt(me.money)+'만원';
  const ps=await db.ref(`${ROOT}/players`).get();const all=[];
  ps.forEach(s=>all.push({n:s.val().name,m:s.val().money}));
  all.sort((a,b)=>b.m-a.m);const rank=all.findIndex(a=>a.n===me.name)+1;
  $('finalRank').textContent=`${all.length}명 중 ${rank}위`;
  buildReport();
}
function softmax(obj,tau){const mx=Math.max(...Object.values(obj));let s=0;const e={};
  Object.keys(obj).forEach(h=>{e[h]=Math.exp((obj[h]-mx)/tau);s+=e[h];});
  Object.keys(e).forEach(h=>e[h]/=s);return e;}
function buildReport(){
  const cells={ss:0,sf:0,ls:0,lf:0,gray:0};const betHist=[];
  for(let r=1;r<=10;r++){
    const res=results[r],bet=myBets[r];if(!res||!bet)continue;
    const fieldR=res.field;
    const subj={};fieldR.forEach(h=>subj[h]=res.bases[h]);
    const owned=myOwned[r]||{};
    CARDS[r-1].forEach((c,i)=>{
      const tg=tgOf(r,i);
      if(c.noeff||!tg||!fieldR.includes(tg))return;
      if(!(c.pub||owned[i]))return;
      let rel=MEDIA[c.m].rel;
      if(myVerified[r]&&myVerified[r].idx===i&&myVerified[r].answer!==undefined)rel=myVerified[r].answer?1:0;
      subj[tg]+=c.e*rel;});
    const p=softmax(subj,4);
    let ehr=0;Object.keys(bet.stakes).forEach(h=>ehr+=bet.stakes[h]/bet.total*(p[h]||0));
    const winner=res.winner;const odds=res.odds[winner]||0;
    const back=bet.stakes[winner]?bet.stakes[winner]*odds:0;
    const profit=back-bet.total>0;
    let jd;if(ehr>=0.30)jd='s';else if(ehr<0.20)jd='l';else jd='g';
    if(jd==='g')cells.gray++;else cells[jd+(profit?'s':'f')]++;
    betHist.push({r,total:bet.total,profit});
  }
  let tiltN=0,confN=0;
  for(let i=1;i<betHist.length;i++){
    const prev=betHist[i-1],cur=betHist[i];
    if(!prev.profit&&cur.total>prev.total*1.5)tiltN++;
    if(i>=2&&betHist[i-1].profit&&betHist[i-2].profit&&cur.total>prev.total*1.4)confN++;}
  let html=`<div class="matrix">
    <div class="mcell"><div class="lb">정합 · 성공</div><div class="ct" style="color:var(--up)">${cells.ss}</div></div>
    <div class="mcell hl"><div class="lb">정합 · 실패 (억울존)</div><div class="ct" style="color:var(--amber)">${cells.sf}</div></div>
    <div class="mcell hl"><div class="lb">이탈 · 성공 (행운존)</div><div class="ct" style="color:var(--amber)">${cells.ls}</div></div>
    <div class="mcell"><div class="lb">이탈 · 실패</div><div class="ct" style="color:var(--down)">${cells.lf}</div></div></div>
  <p style="font-size:12px;color:var(--muted);text-align:center">판정 유보(회색지대) ${cells.gray}회</p>
  <div class="report-p" style="font-size:13.5px;line-height:1.9">
    · 정보와 정합한 베팅이 손실로 끝난 라운드: <b style="color:var(--amber)">${cells.sf}회</b><br>
    · 정보와 이탈한 베팅이 수익으로 끝난 라운드: <b style="color:var(--amber)">${cells.ls}회</b><br>
    · 손실 직후 베팅 규모가 1.5배 이상 커진 횟수: <b style="color:var(--amber)">${tiltN}회</b><br>
    · 연승 직후 베팅 규모가 1.4배 이상 커진 횟수: <b style="color:var(--amber)">${confN}회</b>
  </div>
  <div class="notice">리포트의 해석은 이어지는 디브리핑에서 함께 다룹니다.</div>`;
  $('reportBody').innerHTML=html;
}
</script>
</body>
</html>
