<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>더 레이스 — 스크린</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{--track:#10231C;--board:#0B1512;--panel:#163026;--line:#24443A;--amber:#FFB020;--chalk:#F2EFE6;--muted:#9DB4AA;--up:#5BC77E;--down:#E06A5A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--track);color:var(--chalk);font-family:'Pretendard',sans-serif;overflow:hidden;height:100vh}
.stage{height:100vh;display:flex;flex-direction:column;padding:24px 40px}
.top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.logo{font-family:'Pretendard',sans-serif;font-weight:900;font-size:30px}.logo span{color:var(--amber)}
.rphase{font-family:'Chakra Petch','Pretendard',monospace;font-size:20px;color:var(--amber)}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;
  padding-bottom:var(--topcomp,52px)} /* 상단 헤더 높이만큼 보정 — 화면 정중앙 정렬 */
h1.big{font-family:'Pretendard',sans-serif;font-weight:900;font-size:64px;text-align:center}
h1.big span{color:var(--amber)}
.subbig{text-align:center;color:var(--muted);font-size:20px;margin-top:12px}
/* 출마표 */
.hgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.hcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center}
.hcard .nm{font-family:'Pretendard',sans-serif;font-weight:900;font-size:26px;margin:6px 0 2px}
.hcard .tag{font-size:13px;color:var(--muted);min-height:34px}
.hcard .cond{font-size:14px}
.cond.dn{color:var(--down)}
.condbar{background:var(--board);border:1px solid var(--amber);border-radius:12px;text-align:center;
  padding:14px;font-family:'Pretendard',sans-serif;font-weight:900;font-size:26px;color:var(--amber);margin-bottom:18px}
/* 티커 */
.ticker{max-width:900px;margin:0 auto;width:100%}
.tick{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 22px;margin:12px 0;
  opacity:0;transform:translateY(16px);transition:.5s}
.tick.on{opacity:1;transform:none}
/* 롤링 배너: 5초 주기 — 아래에서 살짝 올라오며 등장, 끝에서 사라짐 */
.tick.cyc{animation:cycfade 5s ease both}
@keyframes cycfade{
  0%{opacity:0;transform:translateY(14px)}
  8%{opacity:1;transform:none}
  88%{opacity:1;transform:none}
  100%{opacity:0;transform:translateY(-10px)}}
.tick .src{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px}
.tick .src .rel{font-family:'Chakra Petch','Pretendard',monospace;color:var(--amber)}
.tick .body{font-size:20px;line-height:1.5}
.tick .eff{font-size:15px;color:var(--muted);margin-top:8px}
.tick .eff b.up{color:var(--up)}.tick .eff b.dn{color:var(--down)}
/* 카운트다운 */
.clock{font-family:'Chakra Petch','Pretendard',monospace;font-size:170px;text-align:center;color:var(--amber);
  text-shadow:0 0 40px rgba(255,176,32,.45)}
/* 레이스 */
.trackbox{background:var(--board);border:2px solid var(--line);border-radius:16px;padding:min(26px,3vh) 0;position:relative}
.lane{height:min(64px,8.2vh);border-bottom:1px dashed var(--line);position:relative;display:flex;align-items:center}
.lane:last-child{border:none}
.runner{position:absolute;left:1%;display:flex;align-items:center;gap:8px;transition:none;will-change:left}
.runner .em{font-size:40px;transform:scaleX(-1)}
.runner .lb{font-family:'Pretendard',sans-serif;font-weight:900;font-size:16px}
.finishline{position:absolute;right:6%;top:0;bottom:0;width:4px;
  background:repeating-linear-gradient(0deg,var(--chalk) 0 8px,var(--board) 8px 16px)}
/* 정산 보드 */
.oddsboard{max-width:820px;margin:0 auto;width:100%}
.orow{display:flex;align-items:center;gap:16px;padding:12px 8px;border-bottom:1px solid var(--line)}
.orow .nm{width:110px;font-family:'Pretendard',sans-serif;font-weight:900;font-size:24px}
.orow .bar{flex:1;height:20px;background:var(--board);border-radius:10px;overflow:hidden}
.orow .bar i{display:block;height:100%;border-radius:10px;transition:width 1s}
.orow .od{width:130px;text-align:right;font-family:'Chakra Petch','Pretendard',monospace;font-size:26px;color:var(--amber)}
.winbanner{text-align:center;margin:10px 0 22px}
.winbanner .w{font-family:'Pretendard',sans-serif;font-weight:900;font-size:52px}
.winbanner .o{font-family:'Chakra Petch','Pretendard',monospace;font-size:34px;color:var(--amber);text-shadow:0 0 24px rgba(255,176,32,.5)}
.calc{font-size:14px;color:var(--muted);text-align:center;margin-top:14px;font-family:'Chakra Petch','Pretendard',monospace}
.truths{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.tchip{font-size:14px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--panel)}
.tchip.t{border-color:var(--up);color:var(--up)}.tchip.f{border-color:var(--down);color:var(--down);opacity:.7}
/* 리더보드 */
.lb-table{max-width:640px;margin:0 auto;width:100%;font-size:22px}
.lb-row{display:flex;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--line)}
.lb-row .rk{width:60px;font-family:'Chakra Petch','Pretendard',monospace;color:var(--amber)}
.lb-row .mn{font-family:'Chakra Petch','Pretendard',monospace;color:var(--amber)}
.lb-row.top{background:var(--panel);border-radius:10px;border:1px solid var(--amber)}
.hidden{display:none!important}
.oddsreveal{animation:oddspop .55s cubic-bezier(.2,1.4,.4,1)}
@keyframes oddspop{from{transform:scale(.55) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes cntpulse{0%{transform:scale(1.6);opacity:0}25%{transform:scale(1);opacity:1}85%{opacity:1}100%{opacity:.2}}
.precnt{animation:cntpulse .9s ease}
</style>
</head>
<body>
<div class="stage">
  <div class="top"><div class="logo">THE <span>RACE</span> <small style="font-size:11px;color:var(--muted);font-weight:400">v0.6</small></div>
  <div style="display:flex;align-items:center;gap:14px">
    <button id="autoBtnS" onclick="toggleAutoS()" style="background:none;border:1px solid var(--line);border-radius:8px;padding:4px 12px;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Chakra Petch','Pretendard',monospace">AUTO OFF</button>
    <div class="rphase" id="rphase">—</div></div></div>
  <div class="center" id="center"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ════════ Firebase 설정 (다른 파일과 동일하게) ════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAyv5Q2_ZPyjvwCqyF3isfVchn_HkwtPPQ",
  authDomain: "hrs1-faaaf.firebaseapp.com",
  databaseURL: "https://hrs1-faaaf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hrs1-faaaf",
  storageBucket: "hrs1-faaaf.firebasestorage.app",
  messagingSenderId: "778756252374",
  appId: "1:778756252374:web:01b24fa2864a87183e5f77"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();const ROOT='therace';
firebase.auth().signInAnonymously().catch(e=>{
  document.getElementById('center').innerHTML=
    `<h1 class="big">연결 <span>오류</span></h1><p class="subbig">${
    e.code==='auth/configuration-not-found'
      ?'익명 인증이 꺼져 있습니다 — Firebase 콘솔 > Authentication > 익명(Anonymous) 사용 설정 후 새로고침'
      :'firebaseConfig 값을 확인하세요 ('+e.code+')'}</p>`;
});

const HORSES={ // s:[스피드,스타트,뒷심,적응력,기수]
 '질풍':{s:[42,48,12,19,29],c:'#C9D6DF',tag:'단거리 스타트 괴물'},
 '만리':{s:[31,14,49,28,28],c:'#3D7BE4',tag:'장거리 대기만성'},
 '중용':{s:[38,32,30,23,27],c:'#D9A62E',tag:'올라운더'},
 '우직':{s:[29,21,32,47,21],c:'#8A5A36',tag:'악천후의 철마'},
 '적토':{s:[45,39,27,22,17],c:'#D94A3D',tag:'맑은 날의 절대자'},
 '섬광':{s:[40,38,22,17,33],c:'#EFE14A',tag:'검증 없는 신마'},
 '현무':{s:[32,24,43,20,31],c:'#5A6B78',tag:'내구형 스테이어'}};
const STATN2=['스피드','스타트','뒷심','적응력','기수'];
const CUSTOM_BASE=100;
let CUSTOM={};
function cardOf(r,i){i=+i;return i>=CUSTOM_BASE?((CUSTOM[r]||{})[i]||null):CARDS[EPX(r)][i];}
/* ── 진위표: admin과 동일 알고리즘 (시드 결정론) ── */
let truthCache=null,cachedSeedS=null;
function genTruth(seed){
  const rng=mulberry32(seed);
  const byMedia={};
  for(let ep=0;ep<10;ep++){
    CARDS[ep].forEach((c,i)=>{
      if(c.noeff)return;
      (byMedia[c.m]=byMedia[c.m]||[]).push({r:ep,i});});
  }
  const truth={};
  Object.keys(byMedia).forEach(m=>{
    const list=byMedia[m];
    const need=Math.round(list.length*MEDIA[m].rel);
    for(let i=list.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[list[i],list[j]]=[list[j],list[i]];}
    list.forEach((x,k)=>truth[`${x.r}_${x.i}`]=k<need);
  });
  return truth;
}
function truths(){
  if(!state||state.seed===undefined)return null;
  if(!truthCache||cachedSeedS!==state.seed){truthCache=genTruth(state.seed);cachedSeedS=state.seed;}
  return truthCache;
}
function truthOf(r,i){i=+i;
  if(i>=CUSTOM_BASE){const c=cardOf(r,i);return !!(c&&c.truth);}
  const T=truths();return !!(T&&T[`${EPX(r)}_${i}`]);}
/* ── 경주 엔진 (admin과 동일 — 자동모드가 admin 없이도 경주·정산을 실행하기 위한 이식) ── */
const BASE_SCALE=44;
const INFO_CAP=24;
const DISTW={'단':[.35,.50,.15],'중':[.40,.30,.30],'장':[.35,.15,.50]};
const TRACKC={'매우 단단함':0.08,'초원':0.20,'진흙탕':0.55,'설원':0.42};
const ENVC={wS:0.22,wF:0.34,tJ:0.42,tS:0.16,gate:1.3,gateS:1.1,rain:0.06,snow:0.06};
const CTR={ad:25,jk:27,st:31};
function baseOnly(stArr,round){
  const S=SC(round),w=DISTW[S.d];
  return (stArr[0]*w[0]+stArr[1]*w[1]+stArr[2]*w[2])/50*BASE_SCALE;
}
function envOnly(stArr,round,gate,fatigue,isFat){
  const S=SC(round);let e=0;
  e+=(stArr[3]-CTR.ad)*TRACKC[S.track];
  if(S.wind==='순풍')e+=(stArr[0]-38)*ENVC.wS;
  if(S.wind==='역풍')e+=(stArr[2]-33)*ENVC.wF;
  if(S.temp==='혹서')e+=(stArr[4]-CTR.jk)*ENVC.tJ;
  if(S.temp==='혹한')e+=(stArr[1]-CTR.st)*ENVC.tS;
  if(S.wx==='비')e+=(stArr[1]-CTR.st)*ENVC.rain;
  if(S.wx==='눈')e+=(stArr[4]-CTR.jk)*ENVC.snow;
  e+=(3-gate)*ENVC.gate+((stArr[1]-33)/50)*(gate-3)*ENVC.gateS;
  if(isFat)e-=0.15*(60-stArr[4]);
  return e;
}
function raceRng(seed,round,horse){
  let h=seed+round*1000;for(const ch of horse)h+=ch.charCodeAt(0);
  return mulberry32(h)()*5;
}
/* 베팅 대기 화면 롤링 규칙 안내 — 튜토리얼 요약 */
const RULE_LINES=[
 ()=>`비공개 정보 ${state&&state.deck?Object.keys(state.deck).length:10}건은 휴대폰 <b style="color:var(--amber)">[상점]</b>에서 구매할 수 있습니다 — 1건 10만원`,
 ()=>`정보 구매권은 라운드당 <b style="color:var(--amber)">3회</b> — 남은 구매권은 다음 라운드로 이월됩니다 (최대 6회)`,
 ()=>`<b style="color:var(--amber)">진위 판별권 20만원</b> — 구매한 정보가 사실인지 거짓인지 확인해 줍니다`,
 ()=>`최종 점수 = <b style="color:var(--chalk)">기본(스탯) + 환경 + 정보 + 당일 운</b>`,
 ()=>`베팅은 최대 <b style="color:var(--amber)">3마리</b> · 한도는 보유액의 <b style="color:var(--amber)">50%</b>`,
 ()=>`배당은 <b style="color:var(--amber)">마감 후 공개</b> — 판돈이 몰린 말일수록 배당이 낮아집니다`,
 ()=>`환경 5요소: <b style="color:var(--chalk)">날씨 · 기후 · 트랙 상태 · 바람 · 게이트</b>`,
 ()=>`<b style="color:var(--down)">진흙탕·설원</b>은 적응력, <b style="color:var(--down)">혹서</b>는 기수, <b style="color:var(--down)">혹한</b>은 스타트가 승부를 가릅니다`,
 ()=>`🌧 비 오는 날은 발주가 미끄럽고, ❄ 눈 오는 날은 기수의 시야 싸움입니다`,
 ()=>`순풍은 <b style="color:var(--chalk)">스피드</b>형에게, 역풍은 <b style="color:var(--chalk)">뒷심</b>형에게 유리합니다`,
 ()=>`게이트는 안쪽(1번)일수록 유리 — 스타트 좋은 말은 바깥에서도 덜 손해봅니다`,
 ()=>`매체마다 <b style="color:var(--amber)">신뢰도</b>가 다릅니다 — 어디서 나온 소식인지 확인하세요`,
 ()=>`직전 경주 <b style="color:var(--down)">우승마는 피로</b>를 안고 출전합니다`,
 ()=>`말대가리 캡틴의 세 마리 — 셋 다 우승 후보라는 뜻은 아닙니다`,
 ()=>`파산해도 딱 한 번, 구제금 10만원이 지급됩니다`];
let SPECIAL={};
db.ref(`${ROOT}/special`).on('value',s=>{SPECIAL=s.val()||{};});
async function acquireRaceLock(r,who){
  try{
    const res=await db.ref(`${ROOT}/locks/race${r}`).transaction(cur=>cur===null?{by:who,t:Date.now()}:undefined);
    return res.committed;
  }catch(e){return false;}
}
async function runRaceS(){
  const r=state.round;const field=Object.values(state.field);
  const deck=Object.values(state.deck||{});
  const rtg=state.cardTg||{};
  const gates=state.gates||{};
  const basePerm={},bases={},baseP={},envP={},statSnap={};
  field.forEach(h=>{
    const st=effStats2(h),g=gates[h]||3;
    baseP[h]=fmt(baseOnly(st,r));
    envP[h]=fmt(envOnly(st,r,g,state.fatigue,state.fatigue===h));
    basePerm[h]=baseP[h]+envP[h];bases[h]=fmt(basePerm[h]);
    statSnap[h]=st;});
  const tempSt={},flat={};
  field.forEach(h=>{tempSt[h]=effStats2(h);flat[h]=0;});
  deck.forEach(ci=>{
    const c=cardOf(r,ci);const tgt=rtg[ci];
    if(!c||c.noeff||!tgt||!field.includes(tgt))return;
    if(!truthOf(r,ci))return;
    if(c.stat==='컨디션'){flat[tgt]+=c.d;return;}
    const si=STATN2.indexOf(c.stat);
    tempSt[tgt][si]=Math.max(5,Math.min(60,tempSt[tgt][si]+c.d));
  });
  const infos={},scores={};
  field.forEach(h=>{
    const g=gates[h]||3;
    const withI=baseOnly(tempSt[h],r)+envOnly(tempSt[h],r,g,state.fatigue,state.fatigue===h);
    const diff=withI-basePerm[h]+flat[h];
    infos[h]=fmt(Math.max(-INFO_CAP,Math.min(INFO_CAP,diff)));
    scores[h]=fmt(basePerm[h]+infos[h]+raceRng(state.seed,r,h));
  });
  const order=[...field].sort((a,b)=>scores[b]-scores[a]);
  const winner=order[0];
  let rb=BETS[r]||{};
  try{const snap=await db.ref(`${ROOT}/bets/${r}`).get();if(snap.exists())rb=snap.val()||{};}catch(e){}
  const pool={};let total=0;
  field.forEach(h=>pool[h]=0);
  Object.values(rb).forEach(b=>{Object.keys(b.stakes).forEach(h=>{pool[h]+=b.stakes[h];total+=b.stakes[h];});});
  const odds={};let welfareExcess=0;
  field.forEach(h=>{
    if(pool[h]<=0){odds[h]=0;return;}
    const raw=total/pool[h];odds[h]=fmt(Math.min(raw,15));
    if(h===winner&&raw>15)welfareExcess=fmt((raw-15)*pool[h]);
  });
  const truthsOut={};deck.forEach(ci=>{const c=cardOf(r,ci);if(c&&!c.noeff)truthsOut[ci]=truthOf(r,ci);});
  const sp=SPECIAL[r];
  const spHorse=sp?order[sp.rank-1]:null;
  let spPaid=0;
  const moneyBefore={};Object.keys(players).forEach(id=>moneyBefore[id]=players[id].money);
  const env=SC(r);
  await db.ref(`${ROOT}/results/${r}`).set({field,deck,bases,infos,scores,order,winner,odds,pool,total,
    baseP,envP,gates,stats:statSnap,cardTg:rtg,
    env:{d:env.d,wx:env.wx,temp:env.temp,track:env.track,wind:env.wind,name:env.name},
    special:sp?{rank:sp.rank,mult:sp.mult,horse:spHorse}:null,
    welfareExcess,truths:truthsOut,moneyBefore,t:Date.now()});
  await db.ref(`${ROOT}/state/phase`).set('race');
  const ups={};
  for(const id of Object.keys(rb)){
    const b=rb[id];let back=0;
    if(b.stakes[winner])back+=b.stakes[winner]*(odds[winner]||0);
    if(sp&&spHorse&&b.stakes[spHorse]){const bonus=fmt(b.stakes[spHorse]*sp.mult);back+=bonus;spPaid+=bonus;}
    if(back>0)ups[`${id}/money`]=fmt(players[id].money+back);
  }
  if(Object.keys(ups).length)await db.ref(`${ROOT}/players`).update(ups);
  console.log(`[AUTO] R${r} 경주 실행 — 우승 ${winner}, 배당 ${odds[winner]||0}배`);
  setTimeout(async()=>{
    const snap=(await db.ref(`${ROOT}/players`).get()).val()||{};
    for(const id of Object.keys(snap)){
      const p=snap[id];
      if(p.money<1&&!p.welfareUsed){
        await db.ref(`${ROOT}/players/${id}`).update({money:10,welfareUsed:true});
        await db.ref(`${ROOT}/log/welfare/${r}/${id}`).set(true);
      }
    }
  },500);
}
/* ── 자동모드 (admin과 스위치 공유 — 락으로 이중 실행 방지) ── */
let AUTO=false,autoStageS='',autoMarkS=0,autoDoneKeyS='',raceAtS=0,lastPhaseS='';
db.ref(`${ROOT}/config/auto`).on('value',s=>{AUTO=!!s.val();
  const b=document.getElementById('autoBtnS');
  if(b){b.textContent=AUTO?'AUTO ON':'AUTO OFF';
    b.style.color=AUTO?'var(--amber)':'var(--muted)';
    b.style.borderColor=AUTO?'var(--amber)':'var(--line)';}});
function toggleAutoS(){db.ref(`${ROOT}/config/auto`).set(!AUTO).catch(()=>{});}
setInterval(autoTickS,400);
async function autoTickS(){
  if(!state||!state.round){autoStageS='';autoDoneKeyS='';raceAtS=0;lastPhaseS='';return;}
  if(state.phase!==lastPhaseS){lastPhaseS=state.phase;if(state.phase==='race')raceAtS=Date.now();else if(state.phase!=='race')raceAtS=0;}

function renderRace(){

function renderRaceRun(){

  </div>
  <p class="subbig" id="raceMsg" style="margin-top:12px">출발 준비…</p>`;

  const FIN=88, N=140;
  const dist=SC(state.round).d;
  const LAPS={'단':1,'중':2,'장':3}[dist];
  const WINT={'단':13000,'중':20000,'장':27000}[dist];
  const rankOf={};order.forEach((h,i)=>rankOf[h]=i);
  // ── 5구간 속도 프로필 ──
  //  1~2구간: 기본 능력대로 (스타트 빠른 말이 선두로 치고 나감)
  //  3~4구간: 파이널 준비 — 스피드·뒷심이 살아나며 대열이 재편
  //  5구간  : 파이널 — 최종 결과값대로 순위 확정
  // 전진 전용(속도 항상 양수, 위치는 누적합) → 뒤로 가는 움직임이 원리적으로 불가능
  const SEGW=[
    {st:1.30,sp:0.25,fin:0.00,res:0.00},  // 1구간 — 발주
    {st:0.75,sp:0.85,fin:0.10,res:0.00},  // 2구간 — 초반 대열
    {st:0.15,sp:0.85,fin:0.35,res:0.25},  // 3구간 — 중반
    {st:0.00,sp:0.40,fin:0.95,res:0.60},  // 4구간 — 승부처 진입
    {st:0.00,sp:0.15,fin:0.80,res:1.40}]; // 5구간 — 파이널
  const scs=f.map(h=>res.scores?(res.scores[h]||0):0);
  const scMin=Math.min(...scs),scMax=Math.max(...scs);
  const norm=h=>scMax>scMin?((res.scores?(res.scores[h]||0):0)-scMin)/(scMax-scMin):0.5;
  const prof={},T={};
  f.forEach(h=>{
    const st=effStats2(h);      // [스피드,스타트,뒷심,적응력,기수]
    const rn=norm(h);           // 최종 결과값(0~1)
    const cum=[0];
    for(let i=0;i<N;i++){
      const u=(i+0.5)/N;
      const seg=Math.min(4,Math.floor(u*5));
      const w=SEGW[seg];
      let v=0.85 + w.st*(st[1]/50) + w.sp*(st[0]/50) + w.fin*(st[2]/50) + w.res*rn;
      v*=0.94+0.12*Math.random(); // 미세 완급 (전진 전용 유지)
      cum.push(cum[i]+v);
    }
    prof[h]=cum;
    T[h]=WINT + rankOf[h]*800 + Math.random()*250; // 최종 순위 = 결승선 통과 시각
  });
  const jitter={};f.forEach(h=>jitter[h]=Math.random()*1000); // 보빙 위상차
  const COMM=[[0.00,'1구간 — 발주!! 스타트 빠른 말이 먼저 치고 나갑니다'],
    [0.20,'2구간 — 초반 대열 형성, 선행마가 페이스를 끌고 갑니다'],
    [0.40,'3구간 — 중반전. 스피드 싸움이 시작됩니다'],
    [0.60,'4구간 — 승부처 진입! 뒷심 있는 말들이 따라붙습니다'],
    [0.80,'5구간 — 파이널!! 여기서 순위가 갈립니다'],
    [0.95,'결승선 앞 대접전!!!']].map(([f2,m])=>[f2*WINT,m]);
  const start=performance.now();let ci=0;
  const totalDur=Math.max(...f.map(h=>T[h]))+1600;
  // 진행률(0~1) → 랩 접기: 짝수랩은 →, 홀수랩은 ← (중거리=왕복, 장거리=3랩)
  function posOf(h,t){
    const u=Math.min(1,t/T[h]);
    const cum=prof[h];const x=u*N;
    const i=Math.min(N-1,Math.floor(x));const fr=x-i;
    const frac=(cum[i]+(cum[i+1]-cum[i])*fr)/cum[N]; // 전체 진행률
    let lap=Math.min(LAPS-1,Math.floor(frac*LAPS));
    const w=frac*LAPS-lap; // 랩 내 진행률
    const goingRight=lap%2===0;
    return {x:goingRight?1+w*(FIN-1):FIN-w*(FIN-1),lap,right:goingRight};
  }
  function frame(now){
    const t=now-start;
    while(ci<COMM.length&&t>=COMM[ci][0]){
      const msg=document.getElementById('raceMsg');if(msg)msg.textContent=COMM[ci][1];ci++;}
    let leadLap=0;
    f.forEach(h=>{
      const p=posOf(h,t);leadLap=Math.max(leadLap,p.lap);
      const el=document.getElementById('rn-'+h);
      if(el){el.style.left=p.x+'%';
        // 질주감: 상하 미세 사인파 보빙 (결승 후 정지)
        const bob=(t<T[h])?Math.sin((t+jitter[h])/140)*3:0;
        el.style.transform=`translateY(${bob}px)`;
        const em=el.querySelector('.em');
        if(em)em.style.transform=p.right?'scaleX(-1)':'scaleX(1)';}
    });
    const li=document.getElementById('lapInd');
    if(li){
      if(LAPS>1&&leadLap+1>=LAPS){li.innerHTML='🏁 <b style="color:var(--down)">마지막 랩!</b> '+`LAP ${LAPS}/${LAPS}`;}
      else li.textContent=LAPS>1?`LAP ${leadLap+1}/${LAPS}`:'';
    }
    if(t<totalDur)requestAnimationFrame(frame);
    else{const msg=document.getElementById('raceMsg');
      if(msg)msg.innerHTML=`🏆 <b style="color:${HORSES[res.winner].c};font-size:26px">${disp(res.winner)}</b> 우승!`;}
  }
  requestAnimationFrame(frame);
}
function renderResult(){
  const res=results[state.round];if(!res)return;
  const f=res.field,total=res.total||0;
  const ord=res.order?Object.values(res.order):f;
  const sp=res.special;
  const tri=v=>{if(v===undefined||v===null)return '<span style="color:var(--muted)">—</span>';
    v=Math.round(v*100)/100;
    if(v===0)return '<span style="color:var(--muted)">—</span>';
    const b2=Math.abs(v)>=10,body=`${v>0?'▲':'▼'}${Math.abs(v)}`;
    return `<span style="color:${v>0?'var(--up)':'var(--down)'}">${b2?'<b>'+body+'</b>':body}</span>`;};
  C.innerHTML=`<div class="winbanner"><span class="w" style="color:${HORSES[res.winner].c}">${disp(res.winner)}</span>
    <span class="w"> 우승</span><div class="o" id="oddsNum">배당 0.00배</div></div>
  <div style="font-size:min(20px,2.4vh);color:var(--muted);margin:min(4px,0.5vh) 0 min(10px,1.2vh)">
    이번 경주 총 판돈 <b style="color:var(--amber);font-family:'Chakra Petch','Pretendard',monospace">${fmt(total)}</b>만원</div>
  <table style="width:min(1150px,94%);margin:0 auto;border-collapse:collapse;font-size:min(21px,2.5vh)">
    <tr style="color:var(--muted);font-size:min(15px,1.9vh)">
      <th style="text-align:left;padding:4px 8px">순위</th><th style="text-align:left">말</th>
      <th style="text-align:right">기본</th><th style="text-align:right">환경</th>
      <th style="text-align:right">정보</th><th style="text-align:right">운</th>
      <th style="text-align:right">최종</th><th style="text-align:right;padding-right:8px">배당</th></tr>
    ${ord.map((h,k)=>{
      const bp=(res.baseP||{})[h],ep=(res.envP||{})[h],inf=(res.infos||{})[h],sc=res.scores[h];
      const luck=(bp!==undefined&&ep!==undefined&&inf!==undefined)?Math.round((sc-bp-ep-inf)*100)/100:undefined;
      return `<tr id="row-${h}" style="opacity:0;border-top:1px solid var(--line);${h===res.winner?'background:rgba(255,176,32,.10)':''}">
      <td style="padding:min(9px,1.1vh) 8px;font-family:'Chakra Petch','Pretendard',monospace;color:var(--amber)">${k+1}${h===res.winner?' 🏆':''}${sp&&h===sp.horse?' <span style="color:var(--up)">★</span>':''}</td>
      <td style="color:${HORSES[h].c};font-family:'Pretendard',sans-serif;font-weight:900">${disp(h)}</td>
      <td style="text-align:right">${bp!==undefined?fmt(bp):'—'}</td>
      <td style="text-align:right">${tri(ep)}</td>
      <td style="text-align:right">${tri(inf)}</td>
      <td style="text-align:right">${tri(luck)}</td>
      <td style="text-align:right"><b>${fmt(sc)}</b></td>
      <td style="text-align:right;padding-right:8px;color:${res.pool[h]?'var(--chalk)':'var(--muted)'}">${res.pool[h]?fmt(res.odds[h])+'배':'—'}</td></tr>`;}).join('')}
  </table>
  <div class="truths" id="truthChips"></div>`;
  // 하위 순위부터 순차 등장
  [...ord].reverse().forEach((h,k)=>{
    setTimeout(()=>{const row=document.getElementById('row-'+h);
      if(row){row.style.opacity=1;row.classList.add('oddsreveal');}},400+k*600);
  });
  // 배당 카운트업 (시그니처)
  const target=res.odds[res.winner]||0;let cur=0;
  const iv=setInterval(()=>{cur+=target/40;if(cur>=target){cur=target;clearInterval(iv);}
    const el=document.getElementById('oddsNum');
    if(el)el.textContent=target===0?'적중자 없음':`배당 ${cur.toFixed(2)}배 확정`;},40);
  // 스페셜 적중자 축하 (금액 미표시) + 상세 안내
  setTimeout(()=>{const tc=document.getElementById('truthChips');if(!tc)return;
    let spHtml='';
    if(sp&&sp.horse){
      const rb=BETS[state.round]||{};
      const names=Object.keys(rb).filter(id=>rb[id]&&rb[id].stakes&&rb[id].stakes[sp.horse])
        .map(id=>(players[id]||{}).name||'?');
      spHtml=`<div style="font-size:min(24px,2.9vh);margin-top:min(12px,1.4vh);color:var(--up)">
        ★ 스페셜 ${sp.rank}위 <b style="color:${(HORSES[sp.horse]||{}).c||'#fff'}">${disp(sp.horse)}</b> ×${sp.mult}배 —
        ${names.length?`<b>${names.length>5?names.slice(0,3).join(' · ')+' 외 '+(names.length-3)+'명':names.join(' · ')}</b> 적중! 축하합니다 🎉`:'적중자 없음'}</div>`;
    }
    tc.innerHTML=spHtml+`<div style="font-size:min(17px,2.1vh);color:var(--muted);margin-top:min(10px,1.2vh)">
      정보의 진위와 점수 내역은 <b style="color:var(--amber)">휴대폰 [결과] 화면</b>에서 확인하세요</div>`;},4600);
}

function renderFinal(){
  const all=Object.values(players).map(p=>({n:p.name,m:p.money})).sort((a,b)=>b.m-a.m);
  C.innerHTML=`<h1 class="big">SEASON <span>FINAL</span></h1>
  <div class="lb-table" style="margin-top:26px">${all.slice(0,10).map((a,i)=>`
    <div class="lb-row ${i===0?'top':''}"><span class="rk">${i+1}</span><span>${a.n}</span>
    <span class="mn">${fmt(a.m)}만</span></div>`).join('')}</div>
  <p class="subbig" style="margin-top:22px">게임은 결과를 보여줬습니다. 이제 과정을 들여다볼 시간입니다 — 휴대폰에서 판단 리포트를 확인하세요.</p>`;
}
</script>
